steps:
  # 1. Deploy Backend (Wait for completion)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy Backend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run deploy ai-bg-remover-backend \
        --source=./backend \
        --region=us-central1 \
        --allow-unauthenticated \
        --port=8080 \
        --set-env-vars=ENV=production

  # 2. Deploy Frontend (Wait for Backend to finish)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy Frontend'
    waitFor: ['Deploy Backend']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run deploy ai-bg-remover-frontend \
        --source=./frontend \
        --region=us-central1 \
        --allow-unauthenticated

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_MEDIUM'