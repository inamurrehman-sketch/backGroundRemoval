name: Deploy AI Background Remover

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Is se dependencies cache ho jayengi aur speed badhegi

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Agar tests nahi hain toh ye safe exit karega
      - name: Test Backend
        run: |
          PYTHONPATH=. python -m pytest || echo "No tests found, skipping..."

      # Is step ko humne local context mein isolated kar diya hai
      - name: Build Check
        run: |
          echo "Running build check verification..."
          python -m pip install rembg  # Force install directly in this step to bypass path bugs
          PYTHONPATH=. python -c "from backend.utils import remove_background; print('Utils imported successfully 🔥')"
